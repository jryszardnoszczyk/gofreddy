# _placeholder_legal_pl — DWF Poland reviewer-assist checklist.
#
# Placeholder per TD-46 revised. Real authoring lands in U17 once
# parallel-track risk #2 (outside-counsel review owner) resolves.
#
# Posture per §Compliance Posture + TD-17: while placeholder is active,
# mandatory two-reviewer sign-off + ≤3/week publish rate cap apply.
# Human gate (U7) carries actual safety weight — these conservative
# patterns are reviewer pattern-matching scaffolding, NOT legal advice.
#
# Targeted regulatory surface (for full authoring in U17):
#   Kodeks Etyki Radcy Prawnego (Code of Ethics for Legal Counsel)
#   Zbiór Zasad Etyki Adwokackiej (Code of Ethics for Advocates)
#   Polish bar advertising restrictions — no solicitation, no fee
#   mentions, no competitor comparisons.
name: legal_pl

metadata:
  authoring_date: 2026-05-18
  authoring_source: "PLACEHOLDER — Kodeks Etyki Radcy Prawnego + Zbiór Zasad Etyki Adwokackiej pending"
  legal_review_status: "placeholder; outside-counsel review parallel-track risk #2"
  reviewer_assist_posture: true
  legal_grade_gate: false
  placeholder: true
  two_reviewer_signoff_required: true
  weekly_publish_rate_cap: 3

rules:
  # Conservative placeholder patterns. Real authoring (U17) expands to
  # ~30-50 rules per ethics-code surface coverage.

  - id: legal_pl_solicitation_direct
    pattern: '\b(zatrudnij\s+nas|wybierz\s+nas|zdecyduj\s+się\s+na\s+naszą\s+kancelarię)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Polish bar ethics codes prohibit direct client solicitation in
      legal-services advertising. "Zatrudnij nas", "wybierz nas",
      "zdecyduj się na naszą kancelarię" trigger the prohibition.
      Reviewer: replace with informational language (e.g. "Jeśli
      potrzebujesz porady w tej sprawie, skontaktuj się").

  - id: legal_pl_fee_reference
    pattern: '\b(cena|honorarium|stawka\s+godzinowa|cennik|rabat\s+na\s+poradę)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Polish bar ethics codes restrict fee/price references in
      advertising. "Cena", "honorarium", "stawka godzinowa", "cennik"
      are flagged. Reviewer: legal-services pricing must be discussed
      in private consultation (engagement letter), not advertised.

  - id: legal_pl_competitor_comparison
    pattern: '\b(lepsi?\s+niż|nasi\s+konkurenci|w\s+przeciwieństwie\s+do\s+innych\s+kancelarii)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Bar ethics codes forbid comparative advertising against named or
      implied competitor firms. Polish idioms "lepsi niż", "nasi
      konkurenci", "w przeciwieństwie do innych kancelarii" hard-block.
      Reviewer: replace with absolute-quality framing referencing the
      partner's own work (citations, named cases, named jurisdictions).

  - id: legal_pl_outcome_guarantee
    pattern: '\b(gwarantujemy\s+wygraną|wygrasz\s+sprawę|sukces\s+w\s+100%|na\s+pewno\s+wygramy)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Legal-services advertising cannot promise litigation outcomes.
      "Gwarantujemy wygraną", "wygrasz sprawę", "sukces w 100%", "na
      pewno wygramy" are direct hard-blocks. Reviewer: replace with
      track-record references (e.g. "Reprezentowaliśmy klientów w X
      sprawach związanych z…") or fact-based partner experience.

  - id: legal_pl_no_engagement_letter_advice
    # Reserved for U17 — placeholder catches the most obvious case.
    pattern: '\b(porada\s+prawna\s+gratis|darmowa\s+porada\s+prawna|free\s+legal\s+advice)\b'
    case_sensitive: false
    severity: soft_warn
    prose: >-
      Free-legal-advice offers without engagement letter create
      liability and conflict-of-interest risk. Reviewer: verify the
      artifact references the firm's intake process + engagement
      letter requirement before advice is provided.

  - id: legal_pl_named_judge_or_court
    pattern: '\b(sędzia\s+\w+|przed\s+sądem\s+\w+|w\s+sądzie\s+\w+)\b.*\b(wygral|przekonal)\b'
    case_sensitive: false
    severity: soft_warn
    prose: >-
      Naming specific judges or courts in case-outcome narratives can
      trigger judicial-influence concerns + court-respect rules.
      Reviewer: verify named-judge / named-court references are
      neutral fact citation, not implicit influence claims.
