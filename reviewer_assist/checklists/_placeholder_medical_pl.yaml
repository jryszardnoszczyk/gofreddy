# _placeholder_medical_pl — Klinika Melitus reviewer-assist checklist.
#
# Placeholder per TD-46 revised. Real authoring lands in U16 once
# parallel-track risk #2 (outside-counsel review owner identification)
# resolves. Until then, this placeholder ships so the framework can be
# tested + Klinika's pre-publish review pipeline (U7) has something to
# load.
#
# Posture per §Compliance Posture + TD-17: while placeholder is active,
# mandatory two-reviewer sign-off + ≤3/week publish rate cap apply.
# Human gate (U7) carries actual safety weight — these conservative
# patterns are reviewer pattern-matching scaffolding, NOT legal advice.
#
# Targeted regulatory surface (for full authoring in U16):
#   Art. 14 Ustawa o działalności leczniczej — health-services advertising
#   prohibitions: superlatives, price references, CTAs, encouragement-to-use.
name: medical_pl

metadata:
  authoring_date: 2026-05-18
  authoring_source: "PLACEHOLDER — Art. 14 Ustawa o działalności leczniczej + Krajowy Rejestr Pomocy Społecznej guidelines pending"
  legal_review_status: "placeholder; outside-counsel review parallel-track risk #2"
  reviewer_assist_posture: true
  legal_grade_gate: false
  placeholder: true
  two_reviewer_signoff_required: true
  weekly_publish_rate_cap: 3

rules:
  # Conservative placeholder patterns. Real authoring (U16) expands to
  # ~30-50 rules per Art. 14 surface coverage.

  - id: medical_pl_superlative_najlepszy
    # Polish nouns + adjectives inflect by case (y/a/ą/ej/ego/emu/...); the
    # stem-anchored \w* captures all the surface forms a reviewer would
    # need flagged. Real authoring (U16) expands per declension table.
    pattern: '\b(najlepsz\w*|najnowocześniejsz\w*|najtańsz\w*|najskuteczniejsz\w*)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Art. 14 forbids superlative claims in health-services advertising.
      Polish-language superlative stems ("najlepsz-", "najnowocześniejsz-",
      "najtańsz-", "najskuteczniejsz-") inflected through any case are
      direct hard-blocks. Reviewer: replace with specific, defensible
      language (e.g. mechanism + outcome + named-study citation).

  - id: medical_pl_cta_book_visit
    pattern: '\b(zarezerwuj|umów\s+wizytę|kup\s+teraz|kliknij\s+i\s+kup)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Art. 14 forbids encouragement-to-use as direct CTAs in health-
      services advertising. "Zarezerwuj", "umów wizytę", "kup teraz",
      "kliknij i kup" trigger the prohibition. Reviewer: replace with
      informational language (e.g. "Skontaktuj się z naszą kliniką, by
      omówić, czy ten zabieg jest dla Ciebie odpowiedni").

  - id: medical_pl_price_reference
    pattern: '\b(cena|cennik|rabat|zniżka|promocja|tania?\s+oferta|raty)\b'
    case_sensitive: false
    severity: soft_warn
    prose: >-
      Art. 14 restricts price references in health-services advertising.
      "Cena", "cennik", "rabat", "zniżka", "promocja", "raty" are flag
      surfaces. Reviewer: verify the artifact's pricing context — direct
      cost-comparison advertising is prohibited; consultative pricing
      ("after consultation, we provide an individualized quote") is
      permitted.

  - id: medical_pl_cure_guarantee
    pattern: '\b(gwarantujemy|gwarantowany|100%\s+skuteczności|całkowite\s+wyleczenie)\b'
    case_sensitive: false
    severity: hard_block
    prose: >-
      Health-services advertising cannot guarantee outcomes. Polish
      idioms "gwarantujemy", "gwarantowany", "100% skuteczności",
      "całkowite wyleczenie" hard-block. Reviewer: replace with
      probabilistic + duration-bounded language ("większość pacjentów
      obserwuje efekt w ciągu N tygodni").

  - id: medical_pl_pain_free_claim
    pattern: '\b(bezbolesny|bez\s+bólu|bez\s+żadnych\s+dolegliwości)\b'
    case_sensitive: false
    severity: soft_warn
    prose: >-
      Procedure-level "pain-free" claims often fail factual review
      (most aesthetic procedures involve some discomfort during /
      after). Reviewer: verify pain-management context is honest
      about recovery experience.

  - id: medical_pl_named_competitor_negative
    # Reserved for U16 full authoring — placeholder catches obvious
    # competitor-naming, real authoring expands to Polish bar /
    # consumer-protection nuance.
    pattern: '\b(lepsza?\s+niż|w\s+przeciwieństwie\s+do|nie\s+tak\s+jak\s+u)\b'
    case_sensitive: false
    severity: soft_warn
    prose: >-
      Comparative advertising against named or implied competitors in
      health-services contexts is restricted under Art. 14 +
      consumer-protection law. Reviewer: verify the artifact does not
      disparage other clinics by name or by implication.
