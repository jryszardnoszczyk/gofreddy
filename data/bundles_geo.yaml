bundle_type: geo
bundle_count: 10
total_lens_count: 42
description: 'Detection-gated: fires when prospect has presence in that geography via hreflang / ccTLD
  / currency / jurisdiction mentions. Each bundle contains mandatory regulatory lenses for operating there.'
source: docs/plans/2026-04-22-005-marketing-audit-lens-catalog.md
bundles:
- id: eu_uk
  number: 1
  name: EU / UK regulatory (largest — fires for ~50% of B2B SaaS prospects)
  trigger: hreflang=de/fr/es/it/nl, .eu/.uk/.de/.fr/.es/.it/.nl TLD, GBP/EUR currency, EU CDN, GDPR cookie
    banner
  lens_count: 7
  lenses:
  - GDPR full compliance (DPO contact + DSAR flow + right-to-erasure UX)
  - UK GDPR / DPA 2018 (ICO registration number ZA-prefix in footer; UK representative for non-UK controllers
    Art. 27)
  - 'Consent Mode v2 quality (already #32 always-on — bundle adds the EU-specific UOOS check)'
  - 'EU-US Data Privacy Framework (DPF) active certification (already #64 always-on)'
  - 'EAA / WCAG 2.2 AA conformance + accessibility statement + VPAT (already #42 always-on — bundle adds
    the €100k EU-penalty disclosure)'
  - 'EU AI Act Article 50 readiness (already #37 always-on — bundle adds Article 13/14 high-risk classification
    check)'
  - 'Sub-processor page transparency / DPA self-serve (already #59 always-on — bundle adds GDPR Art. 28
    DPA depth)'
- id: canada_quebec
  number: 2
  name: Canada-Quebec Law 25
  trigger: .ca TLD, fr-CA hreflang, CAD currency, PIPEDA mention
  lens_count: 4
  lenses:
  - French-language privacy notice (mandatory for QC traffic)
  - '"Personne responsable" disclosure (mandatory)'
  - Automated-decision opt-out
  - Privacy-by-default signals
- id: brazil_lgpd
  number: 3
  name: Brazil LGPD
  trigger: .com.br TLD, pt-BR hreflang, BRL currency, Portuguese content
  lens_count: 3
  lenses:
  - Encarregado (DPO equivalent) name + email mandatory
  - ANPD complaint-channel pointer
  - Portuguese-language version for .com.br traffic
- id: south_africa
  number: 4
  name: South Africa POPIA
  trigger: .za TLD, ZAR currency, SA business address
  lens_count: 2
  lenses:
  - Information Officer registered with Information Regulator + name disclosed
  - PAIA manual link in footer (legally required)
- id: china_pipl
  number: 5
  name: China PIPL
  trigger: .cn TLD, zh-CN hreflang, CNY currency, ICP 备案 license
  lens_count: 4
  lenses:
  - ICP license number in footer (mandatory for any .cn presence)
  - Cross-border transfer mechanism named (CAC standard contract / certification / security assessment)
  - Separate consent for sensitive data categories
  - Local representative for foreign processors
- id: switzerland_nfadp
  number: 6
  name: Switzerland nFADP
  trigger: .ch TLD, CHF currency, German/French/Italian hreflang
  lens_count: 2
  lenses:
  - Swiss representative named for non-CH controllers
  - Explicit "revFADP" / "nFADP" reference
- id: japan_appi
  number: 7
  name: Japan APPI
  trigger: .jp/.co.jp TLD, ja hreflang, JPY currency, Japanese content
  lens_count: 4
  lenses:
  - 個人情報保護方針 header
  - Designated representative if no JP entity
  - Cross-border transfer opt-out
  - CPO (Chief Privacy Officer) disclosure
- id: south_korea
  number: 8
  name: South Korea PIPA
  trigger: .kr TLD, ko hreflang, KRW currency, Korean content
  lens_count: 3
  lenses:
  - Required separate consent checkboxes (필수 required vs 선택 optional)
  - CPO mandatory disclosure (name + email)
  - Separate consent for sensitive personal info
- id: sea_privacy
  number: 9
  name: SEA Privacy (Singapore + Thailand + Vietnam + Philippines)
  trigger: .sg/.th/.vn/.ph TLD, SGD/THB/VND/PHP currency, local language
  lens_count: 4
  lenses:
  - Singapore PDPA (DPO contact + DNC compliance + withdrawal-of-consent mechanism)
  - Thailand PDPA (DPO for sensitive-data + consent banner in Thai for .th)
  - Vietnam PDPD Decree 13/2023 (DPIA reference + MPS notification)
  - Philippines DPA (NPC registration + DPO disclosed)
- id: mea_privacy
  number: 10
  name: MEA Privacy (UAE + Saudi + Israel)
  trigger: .ae/.sa/.il TLD, AED/SAR/ILS currency
  lens_count: 9
  lenses:
  - UAE PDPL (Federal Decree 45/2021) — Data Office notification claim, controller identification
  - Saudi PDPL — SDAIA registration, KSA-resident DPO for sensitive processors
  - Israel Privacy Protection Law + 2024 Amendment 13 — Database registration number, expanded sensitive
    categories enumeration
  - '**Australia Privacy Act 2026 reforms** — covered by statutory-tort signals in core lens U7'
  - '**Argentina Ley 25.326 / Colombia Ley 1581** — auditable but typically lower signal; fold into "LATAM
    posture flag" as a single lens, not a bundle'
  - '**EU/UK geo bundle**: largest at 7 lenses, fires for ~50% of B2B SaaS prospects'
  - '**Brazil / Quebec / China / Switzerland / Japan / Korea / SEA / MEA bundles**: 2-4 lenses each, fire
    for 5-20% of prospects each'
  - '**Total geo-bundle lens count**: ~36 conditional lenses'
  - '**Typical audit firing**: 0-2 geo bundles → 0-10 additional lenses'
