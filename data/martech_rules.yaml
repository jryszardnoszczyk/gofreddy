# martech_rules.yaml — domain-specific overrides + 20+ category groupings
# applied on top of wappalyzer-next's raw output.
#
# Master plan §4.4 — used by src/audit/tools/martech.py to roll the ~2500
# technology detections into 20+ marketing-relevant category groupings that
# Stage 2 agents reason about (analytics, attribution, CMP, CRM, ESP, product
# analytics, session replay, A/B test, CDP, AI-chat, etc.).
#
# Two sections:
#   - groupings: maps category-group name → list of wappalyzer category names
#     and/or specific technology names. A tech matches the group if EITHER
#     its category OR its name appears in the list.
#   - overrides: per-domain forcing rules. Useful when wappalyzer misclassifies
#     (rare, but happens for SaaS-on-SaaS shells where the host tech eclipses
#     the embedded analytics).

groupings:
  analytics:
    - Analytics
    - "Google Analytics"
    - "Plausible Analytics"
    - "Fathom Analytics"
    - "Adobe Analytics"
    - "Matomo Analytics"
    - "Snowplow"
    - "Open Web Analytics"
    - "Mixpanel"
    - "Heap"
    - "Amplitude"

  attribution:
    - "Tag managers"
    - "Google Tag Manager"
    - "Tealium"
    - "Adobe Dynamic Tag Management"
