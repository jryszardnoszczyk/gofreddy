# Capability registry — agency engagement catalog
#
# Source-of-truth for Stage 4 (Proposal). ~48 entries grouped by tier
# (master plan §3.7). Stage 4 reads this file + report.json and authors
# proposal.md / proposal.json by mapping ParentFindings to capability
# entries within the right tier.
#
# Tier semantics:
#   - fix_it    : discrete one-off scoped fix; $5K-$15K typical; days-to-weeks
#   - build_it  : productized engagement with tangible deliverable; $15K-$60K;
#                 weeks-to-months
#   - run_it    : ongoing retainer where agency runs a function as a service;
#                 $5K-$25K/month; quarterly+ commitment
#
# Per-entry schema:
#   id                    — stable capability ID (kebab-case, tier prefix)
#   tier                  — fix_it | build_it | run_it
#   name                  — human-readable engagement name
#   typical_scope         — 1-sentence scope summary
#   investment_usd_range  — [low, high] in USD
#   typical_duration      — string ("2-4 weeks", "ongoing", etc.)
#   answers_finding_shape — short text describing the ParentFinding shape
#                           this capability typically maps from
#   deliverables          — list of concrete artifacts the agency ships
#   wont_do               — explicit boundary (load-bearing — see Stage 4 prompt)
#   prerequisites         — (optional) what JR needs from prospect before start

# ── fix_it tier (~16 entries) ────────────────────────────────────────────

- id: fix-it-tech-seo-cleanup
  tier: fix_it
  name: Technical SEO Cleanup Sprint
  typical_scope: Audit + remediation of CWV failures, redirect chains, sitemap errors, canonicalization issues across the prospect's owned pages
  investment_usd_range: [5000, 12000]
  typical_duration: 2-3 weeks
  answers_finding_shape: Findability findings on technical SEO health (Area 1 #9), schema gaps, robots/llms.txt inconsistency
  deliverables:
    - Prioritized fix list with implementation specs handed to prospect's eng team
    - Implementation pairing sessions (2-4) with prospect's eng team
    - Pre/post CWV + indexability comparison
  wont_do: We do not write or maintain ongoing SEO content; that's a separate retainer (run-it-content-ops)

- id: fix-it-llms-ai-bot-policy
  tier: fix_it
  name: AI-Bot + LLMs.txt Policy Reset
  typical_scope: Standardize robots.txt + llms.txt + AI-bot allowlists across all owned subdomains for AI-search-engine recovery
  investment_usd_range: [4000, 9000]
  typical_duration: 1-2 weeks
  answers_finding_shape: Findability findings on AI bot access (#39), llms.txt absence (#40), AI-citation gaps (#21)
  deliverables:
    - Standardized robots.txt + llms.txt across all subdomains
    - Per-subdomain AI-bot policy rationale doc
    - 30d post-implementation AI-citation tracking via Cloro
  wont_do: We do not produce the LLM-extractable content that AI crawlers will index; that maps to build-it-ai-citation-content

- id: fix-it-schema-stack
