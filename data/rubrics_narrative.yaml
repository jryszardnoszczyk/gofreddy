# Narrative agent rubric (master plan §3.5; CAD-3 = ~26 lenses)
#
# Source-of-truth: docs/plans/2026-04-22-005-marketing-audit-lens-catalog.md
# Areas owned: Area 2 (Content Assets, 4 lenses) + Area 4 (Earned Media & PR, 6
# lenses) + Area 9 (Brand & Authority, 16 lenses).
#
# No dual-fire lenses on this agent.

agent: narrative

lenses:
  # ── Area 2: Content Assets & Authority Plays (4) ─────────────────────
  - id: L-B-12
    catalog_lens: "Area 2 #12"
    name: Free tools / lead magnets / engineering-as-marketing inventory
    report_section: brand_narrative
    primary_providers: [WebFetch, github]
    severity_anchors: "1=1-2 tools | 2=tools exist but no traffic | 3=no engineering-as-marketing surface"

  - id: L-B-15
    catalog_lens: "Area 2 #15"
    name: Research reports / "State of X" authority plays
    report_section: brand_narrative
    primary_providers: [WebFetch, news, gdelt]
    severity_anchors: "1=1 report/year | 2=stale (>18mo) | 3=no proprietary research"

  - id: L-B-60
    catalog_lens: "Area 2 #60"
    name: Proprietary data journalism (/insights, /benchmarks)
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=light insights surface | 2=no benchmarks page | 3=no data-journalism content"

  - id: L-B-99
    catalog_lens: "Area 2 #99"
    name: Courses + books (authority depth)
    report_section: brand_narrative
    primary_providers: [WebFetch, fetch_api_sh]
    severity_anchors: "1=1 course or book | 2=stale or low-engagement | 3=no authority-depth assets"

  # ── Area 4: Earned Media & PR (6) ────────────────────────────────────
  - id: L-C-27
    catalog_lens: "Area 4 #27"
    name: Press coverage + tier distribution
    report_section: brand_narrative
    primary_providers: [news, gdelt]
    severity_anchors: "1=Tier-2 coverage only | 2=press coverage flat 12mo | 3=no press coverage in 6mo"

  - id: L-C-55
    catalog_lens: "Area 4 #55"
    name: Analyst relations posture (Gartner/Forrester/IDC)
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=mentioned in 1 analyst report | 2=AR program absent (mature B2B) | 3=competitor named, prospect absent"

  - id: L-C-57
    catalog_lens: "Area 4 #57"
    name: Founder / exec content posture (LinkedIn/Substack/podcast guesting)
    report_section: brand_narrative
    primary_providers: [linkedin, podcasts, podchaser, bluesky]
    severity_anchors: "1=light cadence | 2=executives ghost-written/inauthentic | 3=zero exec public voice"

  - id: L-C-101
    catalog_lens: "Area 4 #101"
    name: Awards + "as seen in" badges
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=stale badges | 2=no industry awards | 3=competitor walls 6+ awards, prospect walls none"

  - id: L-C-120
    catalog_lens: "Area 4 #120"
    name: Press / media kit (newsroom freshness + journalist quote density + leadership cadence)
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=press kit exists, stale | 2=no /press or /newsroom | 3=no press surface accessible to journalists"

  - id: L-C-166
    catalog_lens: "Area 4 #166"
    name: "Best-of" editorial listicle inclusion (DR40-70 coverage)
    report_section: brand_narrative
    primary_providers: [dataforseo, WebFetch]
    severity_anchors: "1=in 1-2 listicles | 2=competitor ranks in 5+ listicles | 3=zero listicle inclusion for category"

  # ── Area 9: Brand & Authority (16) ───────────────────────────────────
  - id: L-D-11
    catalog_lens: "Area 9 #11"
    name: Positioning + narrative clarity
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=positioning clear, drift on 1-2 surfaces | 2=multiple competing frames | 3=no defensible positioning argument"

  - id: L-D-28
    catalog_lens: "Area 9 #28"
    name: Thought leadership program (sustained public output)
    report_section: brand_narrative
    primary_providers: [WebFetch, linkedin, bluesky, podcasts]
    severity_anchors: "1=monthly output | 2=quarterly + sparse | 3=no sustained public output"

  - id: L-D-35
    catalog_lens: "Area 9 #35"
    name: Customer language alignment (JTBD framing)
    report_section: brand_narrative
    primary_providers: [reviews, WebFetch]
    severity_anchors: "1=site copy mostly aligns with reviews | 2=reviews use different language than site | 3=site speaks to wrong buyer"

  - id: L-D-51
    catalog_lens: "Area 9 #51"
    name: Certifications program (HubSpot Academy / Trailhead model)
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=certs exist, low enrollment | 2=missing for category leader | 3=no certification surface"

  - id: L-D-58
    catalog_lens: "Area 9 #58"
    name: Owned events / flagship event (Dreamforce / INBOUND / Signal model)
    report_section: brand_narrative
    primary_providers: [WebFetch, news]
    severity_anchors: "1=annual event but small | 2=no flagship event for category leader | 3=no owned event surface"

  - id: L-D-71
    catalog_lens: "Area 9 #71"
    name: Status page + uptime transparency
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=status.io basic | 2=no public status | 3=no transparency on incidents (B2B trust gap)"

  - id: L-D-75
    catalog_lens: "Area 9 #75"
    name: Brand salience proxy (Google Trends branded-search trajectory)
    report_section: brand_narrative
    primary_providers: [google_trends]
    severity_anchors: "1=flat trend | 2=12mo decline | 3=competitor's brand trend rising while prospect's flat/declining"

  - id: L-D-80
    catalog_lens: "Area 9 #80"
    name: Customer advocacy / champion / advisory board programs
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=informal program | 2=no public advocacy program | 3=no champion-development surface"

  - id: L-D-83
    catalog_lens: "Area 9 #83"
    name: ESG / sustainability / DEI positioning
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=section exists, thin | 2=no ESG page (regulated/mature segment) | 3=ESG page is greenwash boilerplate"

  - id: L-D-94
    catalog_lens: "Area 9 #94"
    name: Board / advisor / investor credibility signaling
    report_section: brand_narrative
    primary_providers: [WebFetch, fetch_api_sh]
    severity_anchors: "1=advisors named, untitled | 2=no /investors or /board page | 3=competitor walls credibility, prospect doesn't"

  - id: L-D-139
    catalog_lens: "Area 9 #139"
    name: Brand esteem / sentiment delta (review-platform sentiment)
    report_section: brand_narrative
    primary_providers: [reviews]
    severity_anchors: "1=sentiment delta -0.1 to +0.1 | 2=below category mean | 3=below category mean AND declining 6mo"

  - id: L-D-143
    catalog_lens: "Area 9 #143"
    name: Employer brand / careers-page-as-marketing
    report_section: brand_narrative
    primary_providers: [WebFetch, fetch_api_sh]
    severity_anchors: "1=careers page basic | 2=no employer brand investment | 3=Glassdoor 2.x or competitor wins talent narrative"

  - id: L-D-144
    catalog_lens: "Area 9 #144"
    name: Investor relations page
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=basic IR page (public co) | 2=missing for funded startup using press | 3=public co with no IR surface"

  - id: L-D-146
    catalog_lens: "Area 9 #146"
    name: Brand differentiation (BAV vitality/stature)
    report_section: brand_narrative
    primary_providers: [WebFetch, news]
    severity_anchors: "1=differentiated on 2 axes | 2=parity narrative w/ competitors | 3=undifferentiated; me-too positioning"

  - id: L-D-147
    catalog_lens: "Area 9 #147"
    name: Brand personality consistency / voice drift
    report_section: brand_narrative
    primary_providers: [WebFetch, news]
    severity_anchors: "1=voice mostly consistent | 2=press voice diverges from site | 3=different brand identity per surface"

  - id: L-D-148
    catalog_lens: "Area 9 #148"
    name: AI-generated copy density in own copy ("AI tells")
    report_section: brand_narrative
    primary_providers: [WebFetch]
    severity_anchors: "1=light AI-tell vocabulary | 2=systemic across multiple surfaces | 3=site reads like ChatGPT output"

# Synthesis instruction (master plan §3.5)
synthesis_instructions: |
  After all lens firings complete, group SubSignals by report_section
  (mostly brand_narrative; some competitive for SOV-style observations)
  and emit ParentFindings (5-9 total).

  Voice hygiene applies to YOUR OWN OUTPUT — judges read your prose for
  AI tells (MA-6). Strip utilize / leverage / seamless / landscape /
  delve. Em-dash density ≤ 1 per paragraph.

  Each ParentFinding:
  - Strategic headline
  - 2-3 sentence evidence_summary
  - ≥50-word recommendation (strategic, not tactical)
  - addresses_rubrics list
  - proposal_tier_mapping
  - severity = max of children
  - confidence = floor of children
