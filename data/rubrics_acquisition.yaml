# Acquisition agent rubric (master plan §3.5; CAD-3 = ~32 lenses)
#
# Source-of-truth: docs/plans/2026-04-22-005-marketing-audit-lens-catalog.md
# Areas owned:
#   - Area 3 (Paid Media, 6 lenses)
#   - Area 5 (Distribution, Community & Listings, 13 lenses)
#   - Area 10 (Sales / GTM / Enablement, 10 lenses)
#   - Plus 3 cross-area routing for growth-loop / channel-fit lenses

agent: acquisition

lenses:
  # ── Area 3: Paid Media (6) ───────────────────────────────────────────
  - id: L-E-36
    catalog_lens: "Area 3 #36"
    name: Paid creative corpus (Foreplay/Adyntel hook taxonomy + spend intensity)
    report_section: distribution
    primary_providers: [foreplay, adyntel]
    severity_anchors: "1=portfolio with 2-3 angles | 2=angle monoculture | 3=zero paid presence (or all dump-and-coast)"

  - id: L-E-89
    catalog_lens: "Area 3 #89"
    name: Ad creative format diversity (RSA/Meta/LinkedIn/TikTok native)
    report_section: distribution
    primary_providers: [foreplay]
    severity_anchors: "1=2-3 platform-native formats | 2=copy reused across platforms | 3=one-format monoculture"

  - id: L-E-104
    catalog_lens: "Area 3 #104"
    name: Pre-targeting / warmup ad strategy
    report_section: distribution
    primary_providers: [foreplay, adyntel, martech]
    severity_anchors: "1=light warmup investment | 2=jumping straight to direct-response | 3=no awareness ads at all"

  - id: L-E-108
    catalog_lens: "Area 3 #108"
    name: Retargeting pixel coverage
    report_section: distribution
    primary_providers: [martech, WebFetch]
    severity_anchors: "1=Meta+Google pixels | 2=missing LinkedIn/TikTok for B2B | 3=no retargeting infrastructure"

  - id: L-E-111
    catalog_lens: "Area 3 #111"
    name: Paid platform breadth (Google/Meta/LinkedIn/TikTok/Reddit/Quora)
    report_section: distribution
    primary_providers: [foreplay, adyntel, dataforseo]
    severity_anchors: "1=3-4 platforms active | 2=single-platform reliance | 3=no paid acquisition presence at all"

  - id: L-E-123
    catalog_lens: "Area 3 #123"
    name: Competitive ad research
    report_section: competitive
    primary_providers: [foreplay, adyntel]
    severity_anchors: "1=competitor outpaced on 1 platform | 2=competitor outpaced on 2-3 | 3=competitor dominates ad SOV across category"

  # ── Area 5: Distribution, Community & Listings (13) ──────────────────
  - id: L-F-6
    catalog_lens: "Area 5 #6"
    name: Review-site posture (G2/Capterra/TrustRadius/TrustPilot/GetApp/Software Advice)
    report_section: distribution
    primary_providers: [WebFetch, dataforseo]
    severity_anchors: "1=G2 + Capterra present, light review velocity | 2=missing on tier-1 review site | 3=competitor walls 200+ reviews, prospect has <20"

  - id: L-F-19
    catalog_lens: "Area 5 #19"
    name: Integration marketplaces (Zapier/Salesforce/Shopify/Slack/MS/Chrome/AWS/Azure/GCP)
    report_section: distribution
    primary_providers: [WebFetch, fetch_api_sh]
    severity_anchors: "1=2-3 marketplaces | 2=missing on key partner platform | 3=no marketplace presence"

  - id: L-F-26
    catalog_lens: "Area 5 #26"
    name: Launch + niche directories (17-platform Tier-1 + Tier-2/3)
    report_section: distribution
    primary_providers: [WebFetch, fetch_api_sh, product_hunt]
    severity_anchors: "1=Product Hunt + 4-5 directories | 2=missing on industry directories | 3=zero directory presence"

  - id: L-F-46
    catalog_lens: "Area 5 #46"
    name: ASO — App Store + Google Play
    report_section: distribution
    primary_providers: [reviews, WebFetch]
    severity_anchors: "1=apps live, low ratings | 2=missing on iOS or Android | 3=no app surface (when category demands)"

  - id: L-F-65
    catalog_lens: "Area 5 #65"
    name: Owned community (Slack/Discord/Circle/Skool — depth)
    report_section: distribution
    primary_providers: [WebFetch, fetch_api_sh]
    severity_anchors: "1=community exists, low engagement | 2=no owned community for category | 3=community degraded; ghost-town signals"

  - id: L-F-74
    catalog_lens: "Area 5 #74"
    name: Open source community depth
    report_section: distribution
    primary_providers: [github, fetch_api_sh]
    severity_anchors: "1=OSS repo with stars, low contributors | 2=stale repo for OSS-tier prospect | 3=no OSS surface (where category demands)"

  - id: L-F-81
    catalog_lens: "Area 5 #81"
    name: Podcast guesting at scale (CEO ≥6 in 12mo + guest-graph centrality)
    report_section: distribution
    primary_providers: [podcasts, podchaser, fetch_api_sh]
    severity_anchors: "1=2-3 guest spots | 2=no founder podcast presence | 3=competitor founders dominate podcast graph"

  - id: L-F-96
    catalog_lens: "Area 5 #96"
    name: Owned podcast
    report_section: distribution
    primary_providers: [podcasts, WebFetch]
    severity_anchors: "1=launched, sporadic | 2=stale (>6mo) | 3=no owned podcast (when category supports it)"

  - id: L-F-103
    catalog_lens: "Area 5 #103"
