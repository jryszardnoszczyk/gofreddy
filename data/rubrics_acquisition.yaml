    primary_providers: [WebFetch, fetch_api_sh]
    severity_anchors: "1=sponsor 1-2 hackathons | 2=no hackathon presence (dev-tier) | 3=competitor sponsors major hackathons, prospect absent"

  - id: L-F-127
    catalog_lens: "Area 5 #127"
    name: Creator / ambassador program (/creators, /ambassadors)
    report_section: distribution
    primary_providers: [WebFetch]
    severity_anchors: "1=program exists, low activity | 2=no creator program (B2C/PLG) | 3=competitor walls creator program, prospect doesn't"

  - id: L-F-137
    catalog_lens: "Area 5 #137"
    name: Organic social footprint
    report_section: distribution
    primary_providers: [linkedin, bluesky, facebook, fetch_api_sh]
    severity_anchors: "1=active on 2 platforms | 2=ghost accounts on multiple | 3=no organic social cadence"

  # ── Area 10: Sales / GTM / Enablement (10) ───────────────────────────
  - id: L-G-17
    catalog_lens: "Area 10 #17"
    name: Sales enablement public assets (/security, /soc2, ROI calcs, trust center)
    report_section: distribution
    primary_providers: [WebFetch]
