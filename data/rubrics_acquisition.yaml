  - id: L-G-61
    catalog_lens: "Area 10 #61"
    name: Enrichment / identity resolution (RB2B/Clearbit Reveal + geo-gating)
    report_section: distribution
    primary_providers: [martech, WebFetch]
    severity_anchors: "1=Clearbit on signup | 2=no visitor-ID stack for B2B | 3=no firmographic enrichment surface"

  - id: L-G-66
    catalog_lens: "Area 10 #66"
    name: Objection handling content (FAQ depth + "why us")
    report_section: distribution
    primary_providers: [WebFetch]
    severity_anchors: "1=FAQ exists, shallow | 2=no objection-handling content | 3=competitor walls 15-objection coverage, prospect handles 2"

  - id: L-G-90
    catalog_lens: "Area 10 #90"
    name: Speed-to-lead (test via demo-form submission)
    report_section: distribution
    primary_providers: [WebFetch, mailinator]
    severity_anchors: "1=<5min response | 2=24-48h response | 3=>72h or no response"

  - id: L-G-91
    catalog_lens: "Area 10 #91"
    name: Lead scoring + MQL-SQL lifecycle
    report_section: distribution
    primary_providers: [martech]
    severity_anchors: "1=basic lead scoring | 2=no MQL-SQL handoff structure | 3=undifferentiated lead handling"

  - id: L-G-93
    catalog_lens: "Area 10 #93"
    name: ABM tooling (6sense/Demandbase/Terminus + reverse-IP personalization)
    report_section: distribution
    primary_providers: [martech]
    severity_anchors: "1=ABM tool detected, light usage | 2=no ABM stack for enterprise-tier | 3=competitor walls ABM personalization, prospect has none"

  - id: L-G-145
    catalog_lens: "Area 10 #145"
    name: Referral / share mechanics (codes + share-with-team + two-sided)
    report_section: distribution
    primary_providers: [WebFetch, rendered_fetcher]
    severity_anchors: "1=basic referral | 2=no two-sided incentive | 3=no referral surface at all"

  - id: L-G-150
    catalog_lens: "Area 10 #150"
    name: Channel partner program (/resellers / /partners/reseller / white-label)
    report_section: distribution
    primary_providers: [WebFetch]
    severity_anchors: "1=program exists, light visibility | 2=no partner program (when category demands) | 3=zero partner-channel surface"

  # ── Cross-area: growth-loop / channel-fit lenses (3) ─────────────────
  - id: L-H-124
    catalog_lens: "Area 7 #124"
    name: Viral loops / PLG distribution signals
    report_section: distribution
    primary_providers: [WebFetch, rendered_fetcher]
    severity_anchors: "1=1 loop functional | 2=loops broken or single-sided | 3=zero growth loops; pure paid funnel"

  - id: L-H-126
    catalog_lens: "Area 7 #126"
    name: '"Powered by X" badge detection'
    report_section: distribution
    primary_providers: [WebFetch, rendered_fetcher]
    severity_anchors: "1=badge present on partner sites | 2=no Powered-by surface | 3=PLG product with no embed/badge loop"

  - id: L-G-138
    catalog_lens: "Area 10 #138 (subsumed)"
    name: Customer-Cloud / partner-overlap signaling (Crossbeam/Reveal)
    report_section: distribution
    primary_providers: [WebFetch, martech]
    severity_anchors: "1=Crossbeam on /partners | 2=no public partner-overlap signal | 3=no co-sell motion surface"

# Synthesis instruction (master plan §3.5)
synthesis_instructions: |
  After all lens firings complete, group SubSignals by report_section
  (distribution + competitive + lifecycle) and emit 7-12 ParentFindings.

  Channel-model-fit (Phase-0 frame 6) and growth-loops-inventory (frame 7)
  are your anchors — surface them in your top findings if they speak.

  Paid-creative claims MUST follow Corey Haines framework:
  - Cadence classification before volume (burst/sustain/drip-burst/dump-and-coast)
  - Name the angle (pain/outcome/social-proof/curiosity/comparison/urgency/identity/contrarian)
  - Name the cognitive mechanism (social-proof/scarcity/loss-aversion/anchoring/authority/...)
  - Buyer-type tag per ad/page (Technical/Economic/Champion)

  Each ParentFinding:
  - Strategic headline
  - 2-3 sentence evidence_summary
  - ≥50-word recommendation with cost-of-delay framing
  - addresses_rubrics list
  - proposal_tier_mapping
  - severity = max of children
  - confidence = floor of children
