# Pull tuning
limits:
  # max tweets per user pulled per run (twitterapi.io: 15 credits per tweet)
  per_user_max: 30
  # tweets older than this many hours are dropped
  freshness_hours: 36
  # min likes to consider for topic picking
  min_likes_threshold: 20
  # how many top-ranked tweets feed the topic picker
  ranked_top_n: 80
  # search-side: max tweets to keep per search query
  search_max_per_query: 20
  # how many angles topic-picker outputs
  angles_per_run: 8
  # how many drafts ship to drafts/YYYY-MM-DD.md
  final_drafts_count: 5
