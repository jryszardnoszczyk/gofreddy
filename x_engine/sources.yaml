# x_engine sources — research lane configuration
# Niche: AI-native marketing agency / AI / coding agents (gofreddy product context)

# Priority X users (pull last 24h, rank by resonance)
# Curated 2026-05-06 from research at docs/research/2026-05-06-x-content-engine.md §2
x_users:
  # Claude Code skill creators (marketing/GTM-shaped, our exact niche)
  - AlfieJCarter      # Conigma founder, definitive Claude Code marketing skills
  - jack_9947         # viral marketing skill stacks
  - helloitsaustin    # Anthropic growth marketing — meta-commentary
  # Research-heavy agentic operators
  - gkisokay          # Hermes/OpenClaw research agent canon
  - ecomchigga        # validated 12-min daily tweet system
  - N01ennn           # solo-operator case studies
  # Voice cloning + writing methodology
  - rubenhassid       # anti-ai-writing-style canon
  # GTM stack methodology
  - MichLieben        # ColdIQ 4-layer signal stack

# Optional: X lists (cheaper than per-user fan-out at scale)
# Lookup IDs at https://x.com/i/lists/ID — populate when JR creates niche-specific lists
x_lists: []

# Open search queries — find nuggets BEYOND the priority creators.
# Uses /twitter/tweet/advanced_search with `within_time:48h` (the only working freshness filter).
# Each query returns ~7-16 tweets (pagination broken on advanced_search per March 2026 platform degradation).
# min_faves threshold filters out low-engagement noise; topic_picker LLM does final quality filter.
search_queries:
  # Claude Code at depth (tools, skills, MCP, plugins)
  - query: '"claude code" (skill OR skills OR plugin) min_faves:50 within_time:48h -is:retweet lang:en'
    label: claude_code_skills
  - query: '"MCP server" min_faves:40 within_time:48h -is:retweet lang:en'
    label: mcp_servers
  - query: '"CLAUDE.md" OR "claude md" min_faves:30 within_time:48h -is:retweet lang:en'
    label: claude_md
  - query: '"prompt caching" OR "context engineering" OR "context window" min_faves:40 within_time:48h -is:retweet lang:en'
    label: context_eng

  # Harness / agent engineering
  - query: '("agent harness" OR "agent loop" OR "agent runtime") min_faves:30 within_time:48h -is:retweet lang:en'
    label: harness_eng
  - query: '("openclaw" OR "hermes agent") min_faves:25 within_time:48h -is:retweet lang:en'
    label: openclaw_hermes
  - query: '("langgraph" OR "langchain" OR "crewai") min_faves:50 within_time:48h -is:retweet lang:en'
    label: agent_frameworks
  - query: '("DSPy" OR "GEPA optimizer") min_faves:30 within_time:48h -is:retweet lang:en'
    label: dspy_optim

  # Marketing audit / agency operations
  - query: '("AI agency" OR "AI marketing agency") min_faves:50 within_time:48h -is:retweet lang:en'
    label: ai_agency
  - query: '("GTM engineer" OR "GTM stack") min_faves:40 within_time:48h -is:retweet lang:en'
    label: gtm_eng

  # Cost / model tradeoffs (JR's pillar)
  - query: '("opus" OR "sonnet") (cost OR pricing OR token) min_faves:50 within_time:48h -is:retweet lang:en'
    label: claude_cost
  - query: '("deepseek" OR "qwen" OR "kimi") (coding OR code) min_faves:50 within_time:48h -is:retweet lang:en'
    label: oss_models

  # Solo / small-team patterns
  - query: '("solo founder" OR "indie hacker") AI agent min_faves:50 within_time:48h -is:retweet lang:en'
    label: solo_ops
  - query: '("vibe coding" OR "vibe coded") min_faves:50 within_time:48h -is:retweet lang:en'
    label: vibe_coding

  # === MARKETING (heavy pressure — see docs/plans/2026-04-22-005-marketing-audit-lens-catalog.md) ===
  # gofreddy covers all 11 marketing areas; one query per major theme.

  # Area 1: Discoverability — AI search, SEO, GEO
  - query: '("AI search" OR "AI SEO" OR "GEO" OR "generative engine optimization") min_faves:40 within_time:48h -is:retweet lang:en'
    label: ai_search_seo
  - query: '("ChatGPT search" OR "Perplexity search" OR "AI overviews") brand min_faves:30 within_time:48h -is:retweet lang:en'
    label: llm_search_visibility

  # Area 3 + 6: Paid media + conversion architecture
  - query: '("performance max" OR "google ads" OR "meta ads") creative min_faves:40 within_time:48h -is:retweet lang:en'
    label: paid_media
  - query: '("landing page" OR "CRO" OR "conversion rate") teardown min_faves:40 within_time:48h -is:retweet lang:en'
    label: cro

  # Area 8 + 7: Lifecycle, retention, activation, PLG
  - query: '("email marketing" OR "lifecycle marketing" OR "drip campaign") AI min_faves:30 within_time:48h -is:retweet lang:en'
    label: lifecycle
  - query: '("PLG" OR "product-led growth" OR "activation rate") min_faves:40 within_time:48h -is:retweet lang:en'
    label: plg

  # Area 9 + 2: Brand, positioning, content authority
  - query: '("brand positioning" OR "category creation" OR "narrative") B2B min_faves:40 within_time:48h -is:retweet lang:en'
    label: brand_positioning
  - query: '("content strategy" OR "thought leadership" OR "founder content") min_faves:50 within_time:48h -is:retweet lang:en'
    label: content_strategy

  # Area 11: MarTech, measurement, attribution
  - query: '("marketing attribution" OR "MMM" OR "media mix model") min_faves:30 within_time:48h -is:retweet lang:en'
    label: attribution
  - query: '("marketing analytics" OR "GA4" OR "PostHog") min_faves:40 within_time:48h -is:retweet lang:en'
    label: analytics

  # Cross-cutting marketing AI takes
  - query: '("AI marketing" OR "AI agency") (workflow OR tool OR stack) min_faves:50 within_time:48h -is:retweet lang:en'
    label: ai_marketing_meta
  - query: '("B2B SaaS" OR "B2B marketing") AI min_faves:40 within_time:48h -is:retweet lang:en'
    label: b2b_saas

# GitHub repos to watch for releases (free GitHub API, no key required for public)
github_repos:
  - anthropics/claude-code
  - anthropics/anthropic-cookbook
  - openai/openai-agents-python
  - langchain-ai/langgraph
  - langchain-ai/langchain
  - cloudflare/agents
  - microsoft/autogen
  - mvanhorn/last30days-skill
  - sachacoldiq/ColdIQ-s-GTM-Skills

# RSS feeds (parsed via feedparser, already in gofreddy deps)
rss:
  # Anthropic has no public RSS (verified 2026-05-06; all candidates 404). Skip.
  - url: https://openai.com/news/rss.xml
    label: openai
  # blog.langchain.com/rss redirects through 301 chain that never resolves; skip.
  - url: https://changelog.langchain.com/feed.xml
    label: langchain_changelog
  - url: https://thegtmengineer.substack.com/feed
    label: gtmengineer
  - url: https://www.latent.space/feed
    label: latentspace

# Pull tuning
limits:
  # max tweets per user pulled per run (twitterapi.io: 15 credits per tweet)
  per_user_max: 30
  # tweets older than this many hours are dropped
  freshness_hours: 36
  # min likes to consider for topic picking
  min_likes_threshold: 20
  # how many top-ranked tweets feed the topic picker
  ranked_top_n: 50
  # search-side: max tweets to keep per search query
  search_max_per_query: 30
  # how many angles topic-picker outputs
  angles_per_run: 7
  # how many drafts ship to drafts/YYYY-MM-DD.md
  final_drafts_count: 5
