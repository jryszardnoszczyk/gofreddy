domain: x_engine
outputs:
  - "drafts/*.md"
source_data:
  - "angles/*.json"
transient:
  - "session.md"
  - "results.jsonl"
  - "drafts/*.eval.json"
  - "logs/**/*"
notes: "x_engine session outputs live under drafts/; angles cached at session start in angles/. Per-draft eval JSON (drafts/*.eval.json) is in-session evaluator output, not part of the scored artifact set."
