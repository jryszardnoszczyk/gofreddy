domain: storyboard
outputs:
  - "stories/*.json"
  - "storyboards/*.json"
  - "frames/*.json"
  - "findings.md"
  - "report.md"
source_data:
  - "patterns/*.json"
  - "session.md"
transient:
  - "results.jsonl"
  - "logs/**/*"
notes: "Both stories/*.json (from PLAN_STORY) and storyboards/*.json (from IDEATE) must be visible to the scorer — omitting storyboards/*.json was the run #6 I.14 invisibility bug."
