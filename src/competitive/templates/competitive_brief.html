<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Competitive Brief — {{ client_name }}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: "Liberation Sans", "DejaVu Sans", Arial, Helvetica, sans-serif;
            font-size: 11pt;
            line-height: 1.5;
            color: #1a1a1a;
        }

        .header {
            border-bottom: 2px solid #2563eb;
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 18pt;
            color: #2563eb;
            margin: 0 0 4px 0;
        }

        .header .meta {
            font-size: 9pt;
            color: #6b7280;
        }

        h2 {
            font-size: 14pt;
            color: #1e40af;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 4px;
            margin-top: 20px;
        }

        h3 {
            font-size: 12pt;
            color: #374151;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0 16px 0;
            font-size: 10pt;
        }

        th {
            background-color: #f3f4f6;
            text-align: left;
            padding: 6px 8px;
            border: 1px solid #d1d5db;
            font-weight: 600;
        }

        td {
            padding: 5px 8px;
            border: 1px solid #e5e7eb;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

        blockquote {
            border-left: 3px solid #2563eb;
            margin: 8px 0;
            padding: 4px 12px;
            color: #4b5563;
            font-style: italic;
        }

        ul, ol {
            padding-left: 20px;
        }

        li {
            margin-bottom: 4px;
        }

        code {
            background-color: #f3f4f6;
            padding: 1px 4px;
            border-radius: 2px;
            font-size: 10pt;
        }

        pre {
            background-color: #f3f4f6;
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 9pt;
        }

        .footer {
            margin-top: 30px;
            padding-top: 8px;
            border-top: 1px solid #e5e7eb;
            font-size: 8pt;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Freddy — Competitive Intelligence Brief</h1>
        <div class="meta">
            <strong>Client:</strong> {{ client_name }} &nbsp;|&nbsp;
            <strong>Generated:</strong> {{ generated_at }}
        </div>
    </div>

    {{ body | safe }}

    <div class="footer">
        Generated by Freddy Intelligence Platform &bull; {{ generated_at }}
    </div>
</body>
</html>
