{% extends "base.html" %}
{% block title %}{{ slug }} · portal{% endblock %}
{% block head %}
<style>
  /* ----- layout ----- */
  main { max-width: 88rem; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; position: relative; }

  .hdr-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-500);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .dot {
    height: 6px;
    width: 6px;
    border-radius: 9999px;
    background: var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }

  /* Page title — only allowed Fraunces moment (optional serif). */
  h1.page-title {
    font-family: 'Fraunces', 'Inter Tight', serif;
    font-size: clamp(1.6rem, 3.2vw, 2.4rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0 0 2rem;
    color: var(--ink-50);
  }
  h1.page-title .slug { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 500; }

  /* ----- cost-ledger header ----- */
  .cost-card {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 0.75rem;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }
  .cost-metric {
    background: rgba(10,10,12,0.85);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .cost-metric .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-500);
  }
  .cost-metric .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    color: var(--ink-50);
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .cost-metric.is-month .value { color: var(--accent); }

  /* Bridge-down: single dim-ink row across all three columns. */
  .cost-card.is-unavailable {
    grid-template-columns: 1fr;
  }
  .cost-card.is-unavailable .cost-metric {
    padding: 1rem 1.5rem;
  }
  .cost-card.is-unavailable .cost-unavailable {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-500);
  }

  /* ----- section heading ----- */
  section.timeline-section { margin: 0; }
  section.timeline-section h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-500);
    margin: 0 0 1rem;
  }

  /* ----- moments timeline (reuses landing-page log-stream vocabulary) ----- */
  @keyframes caret-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .caret-blink {
    display: inline-block;
    width: 0.5em;
    height: 1em;
    background: var(--accent);
    vertical-align: -0.15em;
    animation: caret-blink 1s steps(2,start) infinite;
  }
  @keyframes log-line-reveal {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .log-stream {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 0.5rem;
    background: rgba(7,7,9,0.4);
    padding: 0.75rem 0.25rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    /* Newest-first: rows are prepended in DOM order, so default flow works. */
  }

  /* Row anchor — whole row is the click target. */
  a.log-line {
    opacity: 0;
    animation: log-line-reveal 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    display: grid;
    grid-template-columns: 5.5rem 14rem auto 1fr;
    gap: 0.75rem;
    align-items: baseline;
    padding: 0.45rem 0.85rem;
    border-radius: 0.25rem;
    text-decoration: none;
    color: var(--ink-300);
    transition: background 140ms, color 140ms;
  }
  a.log-line:hover {
    background: rgba(255,255,255,0.025);
    color: var(--ink-50);
  }
  a.log-line .ts { color: var(--ink-600); font-size: 0.76rem; }
  a.log-line .session-tag {
    color: var(--ink-500);
    font-size: 0.76rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  a.log-line .title {
    color: var(--ink-200);
    grid-column: 4 / 5;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  a.log-line:hover .title { color: var(--ink-50); }

  /* "needs review" badge between session-tag and title (review_required only). */
  a.log-line .badge {
    grid-column: 3 / 4;
  }
  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.1rem 0.5rem;
    border-radius: 0.25rem;
    line-height: 1.3;
  }
  .badge-action {
    color: var(--warm, #f4b95b);
    background: rgba(244,185,91,0.08);
    border: 1px solid rgba(244,185,91,0.35);
  }

  /* Accent colour mapping (R-Schema-2). Title is the accent surface;
     it inherits the colour the row's kind/moment_kind class assigns. */
  /* --- lime: positive / agent-deliverable --- */
  a.log-line.k-session_start .title,
  a.log-line.k-session_end .title,
  a.log-line.k-render .title,
  a.log-line.k-promotion .title,
  a.log-line.k-review_approve .title,
  a.log-line.k-mk-deliverable_ready .title,
  a.log-line.k-mk-session_completed .title,
  a.log-line.k-mk-decision_logged .title,
  a.log-line.k-mk-error_recovered .title { color: var(--accent); }

  /* --- warm: human/client attention required, breach signals --- */
  a.log-line.k-review_required .title,
  a.log-line.k-review_reject .title,
  a.log-line.k-sla_breach .title,
  a.log-line.k-mk-review_required .title,
  a.log-line.k-mk-attribution_conflict .title { color: var(--warm, #f4b95b); }

  /* --- dim ink-500: cost milestones + unrecognized kinds default --- */
  a.log-line.k-mk-cost_milestone .title { color: var(--ink-500); }

  /* warm var fallback (base.html doesn't define --warm) */
  :root { --warm: #f4b95b; --ink-200: #d6d3d1; --ink-300: #a8a29e; }

  /* ----- interaction states ----- */
  .empty-state, .partial-load, .reconnect-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-500);
    padding: 0.75rem 1rem;
  }
  .empty-state { padding: 1.5rem 1rem; }
  .reconnect-indicator { color: var(--ink-500); display: none; }
  .reconnect-indicator.is-active { display: block; }

  /* Skeleton placeholders for the REST-loading state — static dim rows,
     not shimmer (restrained-motion design language). */
  .skeleton-line {
    display: grid;
    grid-template-columns: 5.5rem 14rem 1fr;
    gap: 0.75rem;
    padding: 0.45rem 0.85rem;
  }
  .skeleton-line .bar {
    height: 0.7rem;
    background: rgba(255,255,255,0.04);
    border-radius: 0.2rem;
  }
</style>
{% endblock %}
{% block body %}
<nav class="nav">
  <div class="nav-inner">
    <a href="/portal/{{ slug }}" class="brand">
      <span class="brand-sq"></span>
      <span class="brand-name">freddy</span>
    </a>
    <div class="nav-meta">
      <span id="user-email"></span>
      <button class="btn-logout" id="logout">log_out</button>
    </div>
  </div>
</nav>

<div class="halo halo-accent" style="top:-80px;right:-80px;width:480px;height:480px;"></div>

<main role="main" data-slug="{{ slug }}">
  <div class="hdr-tag"><span class="dot"></span><span>client_portal · live</span></div>
  <h1 class="page-title">moments · <span class="slug">{{ slug }}</span></h1>

  <!-- Cost-ledger header. JS replaces innerHTML on load (populated / zero /
       ledger-bridge-down). Default shape pre-fetch matches populated layout
       with $0 placeholders so the page doesn't jump. -->
  <div class="cost-card" id="cost-card" aria-label="Cost ledger rollup">
    <div class="cost-metric">
      <span class="label">today</span>
      <span class="value" id="cost-today">$0.00</span>
    </div>
    <div class="cost-metric">
      <span class="label">this week</span>
      <span class="value" id="cost-week">$0.00</span>
    </div>
    <div class="cost-metric is-month">
      <span class="label">this month</span>
      <span class="value" id="cost-month">$0.00</span>
    </div>
  </div>

  <section class="timeline-section" aria-labelledby="timeline-heading">
    <h2 id="timeline-heading">moments timeline <span class="caret-blink" aria-hidden="true"></span></h2>
    <div class="log-stream" id="timeline" role="list" aria-live="polite">
      <!-- loading-from-REST state: 6 skeleton .log-line placeholders. -->
      <div class="skeleton-line"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
      <div class="skeleton-line"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
      <div class="skeleton-line"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
      <div class="skeleton-line"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
      <div class="skeleton-line"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
      <div class="skeleton-line"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
    </div>
    <div class="reconnect-indicator" id="reconnect-indicator">reconnecting…</div>
  </section>
</main>

<script src="/static/portal_moments.js"></script>
{% endblock %}
