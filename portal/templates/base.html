<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Freddy{% endblock %}</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0b'/%3E%3Crect x='28' y='28' width='44' height='44' fill='%23c4fa0d'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --accent: #c4fa0d; --bg: #0a0a0c; --ink-50: #fafaf9; --ink-400: #a8a29e; --ink-500: #78716c; --ink-600: #57534e; --ink-700: #44403c; --ink-800: #292524; --ink-900: #1c1917; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--ink-50); font-family: 'Inter Tight', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .grid-lines { background-image: linear-gradient(to right, rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.035) 1px, transparent 1px); background-size: 56px 56px; }
  .halo { position: absolute; border-radius: 9999px; filter: blur(100px); opacity: 0.2; pointer-events: none; }
  .halo-accent { background: radial-gradient(circle, var(--accent) 0%, transparent 70%); }
  a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }
  .nav { border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(10,10,12,0.85); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 10; }
  .nav-inner { max-width: 88rem; margin: 0 auto; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 0.625rem; text-decoration: none; color: var(--ink-50); }
  .brand-sq { height: 1.5rem; width: 1.5rem; background: var(--accent); border-radius: 4px; }
  .brand-name { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.125rem; letter-spacing: -0.01em; }
  .nav-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--ink-500); display: flex; align-items: center; gap: 1rem; }
  .btn-logout { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--ink-400); background: transparent; border: 1px solid rgba(255,255,255,0.08); padding: 0.4rem 0.75rem; border-radius: 0.375rem; cursor: pointer; transition: color 180ms, border-color 180ms; }
  .btn-logout:hover { color: var(--ink-50); border-color: rgba(255,255,255,0.25); }
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
