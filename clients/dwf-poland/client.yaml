#   escalate_at_pct_sla: 50

weekly_publish_target: 3  # legal firm — lower throughput than aesthetic clinic

brand_assets:
  style_guide: clients/dwf-poland/brand/style-guide.md
  logo: clients/dwf-poland/brand/logo.svg
  palette: clients/dwf-poland/brand/palette.json

brief_consumption:
  top_k_per_run: 3

