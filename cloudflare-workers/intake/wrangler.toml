name = "gofreddy-intake"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Form intake worker — receives POST from gofreddy.ai form, forwards to
# Fly API /v1/scan/request. Returns 200 + tracking_url to the browser.

[vars]
FLY_API_BASE = "https://api.gofreddy.ai"

# secrets (set via `wrangler secret put`):
# - FLY_API_TOKEN (optional bearer for upstream auth)

[[routes]]
pattern = "gofreddy.ai/api/scan-request"
zone_name = "gofreddy.ai"

[observability]
enabled = true
