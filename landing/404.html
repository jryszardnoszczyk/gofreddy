<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Freddy</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0b'/%3E%3Crect x='28' y='28' width='44' height='44' fill='%23c4fa0d'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: #0a0a0c;
    color: #fafaf9;
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, #000 0%, transparent 85%);
  }
  .halo {
    position: fixed; border-radius: 9999px; filter: blur(120px);
    pointer-events: none;
  }
  .halo-accent {
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 600px; height: 400px;
    background: radial-gradient(circle, #c4fa0d 0%, transparent 70%);
    opacity: 0.18;
  }
  .wrap {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 640px;
  }
  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: #c4fa0d;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(5rem, 18vw, 12rem);
    font-weight: 900;
    letter-spacing: -0.05em;
    line-height: 0.9;
    margin: 0 0 1.5rem;
    color: #fafaf9;
  }
  h1 .accent { color: #c4fa0d; }
  p {
    font-size: 1.125rem;
    color: #a8a29e;
    line-height: 1.5;
    margin: 0 0 2rem;
  }
  .cli {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.5rem;
    padding: 1rem 1.25rem;
    text-align: left;
    margin: 0 auto 2rem;
    max-width: 440px;
    color: #a8a29e;
  }
  .cli .k { color: #c4fa0d; }
  .cli .v { color: #fafaf9; }
  .cta {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: 'JetBrains Mono', monospace;
    background: #c4fa0d; color: #0a0a0c;
    padding: 0.875rem 1.5rem;
    border-radius: 0.375rem;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    transition: transform 200ms;
  }
  .cta:hover { transform: translateX(-2px); }
  .cta:hover span { transform: translateX(4px); }
  .cta span { transition: transform 200ms; }
  a:focus-visible { outline: 2px solid #c4fa0d; outline-offset: 3px; }
  @keyframes blink { 50% { opacity: 0; } }
  .caret { animation: blink 1s step-end infinite; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="halo halo-accent"></div>

  <main class="wrap">
    <div class="status">http_status: 404</div>
    <h1>4<span class="accent">0</span>4</h1>
    <p>The page you requested isn't in the workspace.</p>
    <div class="cli">
      <div>$ <span class="v">freddy route --lookup <em>"this_page"</em></span></div>
      <div><span style="color:#f87171">✗</span> not_found <span style="color:#57534e">// resource does not exist or has been relocated</span></div>
      <div>$ <span class="caret">_</span></div>
    </div>
    <a href="/" class="cta">
      &lt;- back_to_home
      <span>→</span>
    </a>
  </main>
</body>
</html>
