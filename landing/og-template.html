<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Freddy — OG template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: #0a0a0c;
    color: #fafaf9;
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    position: relative;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: linear-gradient(to bottom right, #000 0%, transparent 70%);
  }
  .halo {
    position: absolute; border-radius: 9999px;
    filter: blur(140px); pointer-events: none;
  }
  .halo-accent {
    top: -100px; right: -80px; width: 700px; height: 700px;
    background: radial-gradient(circle, #c4fa0d 0%, transparent 70%);
    opacity: 0.28;
  }
  .halo-violet {
    bottom: -200px; left: -150px; width: 500px; height: 500px;
    background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
    opacity: 0.22;
  }
  .content {
    position: relative; z-index: 2;
    padding: 70px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-sq {
    width: 36px; height: 36px; border-radius: 8px; background: #c4fa0d;
  }
  .brand-name {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 28px; letter-spacing: -0.02em;
  }
  .brand-meta {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: #78716c; letter-spacing: 0.14em; text-transform: uppercase;
  }
  h1 {
    font-size: 124px; font-weight: 900; letter-spacing: -0.045em; line-height: 0.92;
    margin: 0; max-width: 900px;
  }
  .accent { color: #c4fa0d; }
  .sub {
    font-size: 26px; color: #a8a29e; max-width: 780px; line-height: 1.45;
    margin: 0; font-weight: 400;
  }
  .bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .stats {
    display: flex; gap: 48px;
  }
  .stat {
    display: flex; flex-direction: column; gap: 6px;
  }
  .stat-v {
    font-family: 'JetBrains Mono', monospace; font-weight: 800;
    font-size: 38px; color: #fafaf9;
  }
  .stat-k {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: #78716c; letter-spacing: 0.08em;
  }
  .url {
    font-family: 'JetBrains Mono', monospace; font-size: 22px;
    color: #c4fa0d; font-weight: 700;
  }
  .stripe {
    position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
    background: linear-gradient(to right, transparent 0%, #c4fa0d 25%, #c4fa0d 75%, transparent 100%);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="halo halo-accent"></div>
  <div class="halo halo-violet"></div>

  <div class="content">
    <div class="brand">
      <div class="logo-sq"></div>
      <div class="brand-name">freddy</div>
      <div class="brand-meta">// distribution_engineering</div>
    </div>

    <div>
      <h1>Distribution,<br>engineered<span class="accent">.</span></h1>
    </div>

    <div class="bottom">
      <div class="stats">
        <div class="stat">
          <div class="stat-v">$1K</div>
          <div class="stat-k">audit_from</div>
        </div>
        <div class="stat">
          <div class="stat-v">2w</div>
          <div class="stat-k">turnaround</div>
        </div>
        <div class="stat">
          <div class="stat-v accent">6</div>
          <div class="stat-k">client_cap</div>
        </div>
      </div>
      <div class="url">gofreddy.ai</div>
    </div>
  </div>

  <div class="stripe"></div>
</body>
</html>
